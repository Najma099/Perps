services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  db-poller:
    build:
      context: .
      dockerfile: Dockerfile.background
    environment:
      REDIS_URL: redis://redis:6379
      EVENTS_QUEUE: stream:events
      DATABASE_URL: "${DATABASE_URL}"
    working_dir: /app/db-poller
    command: ["bun", "run", "src/index.ts"]
    depends_on:
      - redis
    restart: unless-stopped

  engine:
    build:
      context: .
      dockerfile: Dockerfile.background
    environment:
      REDIS_URL: redis://redis:6379
      INCOMING_QUEUE: orders:in
      DATABASE_URL: "${DATABASE_URL}"
      JWT_SECRET: "${JWT_SECRET}"
    working_dir: /app/engine
    command: ["bun", "run", "src/index.ts"]
    depends_on:
      - redis
    restart: unless-stopped

  market-feed:
    build:
      context: .
      dockerfile: Dockerfile.background
    environment:
      REDIS_URL: redis://redis:6379
    working_dir: /app/scripts
    command: ["bun", "run", "market-feed.ts"]
    depends_on:
      - redis
    restart: unless-stopped

  worker-btc:
    build:
      context: .
      dockerfile: Dockerfile.background
    environment:
      REDIS_URL: redis://redis:6379
      MARKET: BTCUSDT
      SPREAD: "2000"
    working_dir: /app/scripts
    command: ["bun", "run", "worker.ts"]
    depends_on:
      - redis
      - engine
    restart: unless-stopped


  ws-service:
    build:
      context: .
      dockerfile: ws-service/Dockerfile
    ports:
      - "8080:8080"
    environment:
      REDIS_URL: redis://redis:6379
      WS_PORT: "8080"
    depends_on:
      - redis
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      REDIS_URL: redis://redis:6379
      INCOMING_QUEUE: orders:in
      JWT_SECRET: "${JWT_SECRET}"
      PORT: "3000"
      DATABASE_URL: "${DATABASE_URL}"
    depends_on:
      - redis
    restart: unless-stopped
    command: ["bun", "run", "src/index.ts"]

volumes:
  redis-data:
